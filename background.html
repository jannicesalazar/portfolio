<!-- Reusable Background -->
<div class="fixed inset-0 -z-10 overflow-hidden"
  style="background: linear-gradient(135deg, #fff5f5 0%, #fef3f8 25%, #f5f0ff 50%, #f0f7ff 75%, #f5fffa 100%);">

  <!-- Blobs -->
  <div class="blob absolute w-64 h-64 opacity-30 float-element" style="background: linear-gradient(135deg, #FFB6C1, #FFC0CB); top: -5%; left: -5%;"></div>
  <div class="blob-2 absolute w-48 h-48 opacity-25 float-delayed" style="background: linear-gradient(135deg, #B5EAD7, #C7F9CC); top: 10%; right: -3%;"></div>
  <div class="blob absolute w-56 h-56 opacity-20 float-element" style="background: linear-gradient(135deg, #C9B1FF, #E0BBE4); bottom: 5%; left: 5%;"></div>
  <div class="blob-2 absolute w-40 h-40 opacity-25 float-delayed" style="background: linear-gradient(135deg, #FFDAC1, #FFE5B4); bottom: 15%; right: 10%;"></div>

  <!-- Sparkles -->
  <div class="absolute text-2xl sparkle" style="top: 15%; left: 15%;">✨</div>
  <div class="absolute text-xl sparkle" style="top: 25%; right: 20%;">⭐</div>
  <div class="absolute text-2xl sparkle" style="bottom: 30%; left: 10%;">💫</div>
  <div class="absolute text-xl sparkle" style="bottom: 20%; right: 15%;">✨</div>
  <div class="absolute text-lg sparkle" style="top: 40%; left: 5%;">🌸</div>
  <div class="absolute text-lg sparkle" style="top: 60%; right: 8%;">🌷</div>

</div>

<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to My Portfolio</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- SDK Scripts -->
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
</head>
<body class="h-full">

  <!-- App Wrapper -->
  <div id="app-wrapper" class="h-full w-full overflow-auto" 
       style="background: linear-gradient(135deg, #fff5f5 0%, #fef3f8 25%, #f5f0ff 50%, #f0f7ff 75%, #f5fffa 100%);">

    <!-- Floating decorative elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
      <!-- Blobs -->
      <div class="blob absolute w-64 h-64 opacity-30 float-element" 
           style="background: linear-gradient(135deg, #FFB6C1, #FFC0CB); top: -5%; left: -5%;"></div>
      <div class="blob-2 absolute w-48 h-48 opacity-25 float-delayed" 
           style="background: linear-gradient(135deg, #B5EAD7, #C7F9CC); top: 10%; right: -3%;"></div>
      <div class="blob absolute w-56 h-56 opacity-20 float-element" 
           style="background: linear-gradient(135deg, #C9B1FF, #E0BBE4); bottom: 5%; left: 5%; animation-delay: -2s;"></div>
      <div class="blob-2 absolute w-40 h-40 opacity-25 float-delayed" 
           style="background: linear-gradient(135deg, #FFDAC1, #FFE5B4); bottom: 15%; right: 10%; animation-delay: -1s;"></div>

      <!-- Sparkles -->
      <div class="absolute text-2xl sparkle" style="top: 15%; left: 15%;">✨</div>
      <div class="absolute text-xl sparkle" style="top: 25%; right: 20%; animation-delay: -0.5s;">⭐</div>
      <div class="absolute text-2xl sparkle" style="bottom: 30%; left: 10%; animation-delay: -1s;">💫</div>
      <div class="absolute text-xl sparkle" style="bottom: 20%; right: 15%; animation-delay: -1.5s;">✨</div>
      <div class="absolute text-lg sparkle" style="top: 40%; left: 5%; animation-delay: -0.3s;">🌸</div>
      <div class="absolute text-lg sparkle" style="top: 60%; right: 8%; animation-delay: -0.8s;">🌷</div>
    </div>

    <!-- Main Content -->
    <main id="page-content" class="relative z-10 min-h-full flex flex-col items-center justify-center px-6 py-12">
      <div class="text-center max-w-2xl">

        <!-- Avatar -->
        <div class="mb-8 bounce-in opacity-0" style="animation-delay: 0.1s;">
          <div class="inline-block p-6 rounded-full shadow-lg wiggle overflow-hidden" 
               style="background: linear-gradient(135deg, #FFE5EC, #FFF0F5); width: 160px; height: 160px;">
            <img src="https://www.caldwell.edu/wp-content/uploads/2023/11/ACADEMICS-6.jpg" 
                 alt="Jannice Salazar" loading="lazy" 
                 onerror="this.style.background='#e5e7eb'; this.alt='Image unavailable';" 
                 style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
          </div>
        </div>

        <!-- Greeting -->
        <p id="greeting-text" class="text-xl md:text-2xl mb-2 bounce-in opacity-0" 
           style="font-family: 'Quicksand', sans-serif; color: #FF9AA2; animation-delay: 0.3s;">
          Hello there! <span class="wave-hand">👋</span>
        </p>

        <!-- Name -->
<h1 class="bounce-in opacity-0" style="animation-delay: 0.5s;">
  <span class="block text-lg md:text-xl mb-2" style="font-family: 'Quicksand', sans-serif; font-weight: 500; color: #070707;">I'm</span>
  <span id="name-text" class="block text-2xl md:text-4xl font-bold bg-clip-text text-transparent"
        style="font-family: 'Quicksand', sans-serif;
               background: linear-gradient(270deg, #FF9AA2, #FFB7B2, #FFDAC1, #E2F0CB, #B5EAD7, #C7CEEA);
               background-size: 1200% 1200%;
               animation: gradient 10s ease infinite;">
    Jannice Salazar
  </span>
</h1>

<style>
@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
        <!-- Tagline -->
        <p id="tagline-text" class="mt-6 text-lg md:text-xl bounce-in opacity-0" 
           style="font-family: 'Quicksand', sans-serif; font-weight: 500; color: #9B9B9B; animation-delay: 0.7s;">
          ✨ Designer & Developer crafting digital magic ✨
        </p>

        <!-- Decorative Divider -->
        <div class="my-8 flex items-center justify-center gap-3 slide-up opacity-0" style="animation-delay: 0.9s;">
          <span style="color: #FFB6C1;">♡</span>
          <div class="w-16 h-0.5 rounded-full" style="background: linear-gradient(90deg, #FFB6C1, #B5EAD7);"></div>
          <span style="color: #B5EAD7;">♡</span>
          <div class="w-16 h-0.5 rounded-full" style="background: linear-gradient(90deg, #B5EAD7, #C7CEEA);"></div>
          <span style="color: #C7CEEA;">♡</span>
        </div>

<a href="portfolio.html">
  <div class="slide-up opacity-0" style="animation-delay: 1.1s;">
    <button id="cta-button" class="cute-button px-10 py-4 rounded-full text-white text-lg font-semibold shadow-xl"
            style="font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #FF9AA2, #FFB7B2, #FFDAC1);">
      <span class="relative z-10 flex items-center gap-2">
        Enter my world
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </span>
    </button>
  </div>
</a>
        <!-- Social Links -->
<div class="mt-12 flex items-center justify-center gap-6 slide-up opacity-0" style="animation-delay: 1.3s;">
  <a href="https://www.instagram.com/jannicesalazar/" target="_blank" rel="noopener noreferrer"
     class="group p-3 rounded-full transition-all duration-300 hover:scale-110"
     style="background: rgba(255, 182, 193, 0.2);" aria-label="Instagram">
    <svg class="w-6 h-6 transition-colors" style="color: #FF9AA2;" fill="currentColor" viewBox="0 0 24 24">

    </svg>
  </a>
  <a href="https://www.linkedin.com/in/jannicesalazar/" target="_blank" rel="noopener noreferrer"
     class="group p-3 rounded-full transition-all duration-300 hover:scale-110"
     style="background: rgba(199, 206, 234, 0.3);" aria-label="LinkedIn">
    <svg class="w-6 h-6 transition-colors" style="color: #9BA3D0;" fill="currentColor" viewBox="0 0 24 24">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
  </a>
</div>

      </div>
    </main>

  </div>

  <!-- Custom JS -->
  <script src="script.js"></script>

</body>
</html>

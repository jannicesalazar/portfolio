 <head>

  <style>
    * { box-sizing: border-box; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes float-delayed {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-5deg); }
    }
    
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    
    @keyframes wave {
      0% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
      60% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }
    
    @keyframes bounce-in {
      0% { opacity: 0; transform: scale(0.3) translateY(50px); }
      50% { transform: scale(1.05) translateY(-10px); }
      70% { transform: scale(0.95) translateY(5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    @keyframes slide-up {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .float-element { animation: float 4s ease-in-out infinite; }
    .float-delayed { animation: float-delayed 5s ease-in-out infinite; }
    .wiggle { animation: wiggle 2s ease-in-out infinite; }
    .sparkle { animation: sparkle 2s ease-in-out infinite; }
    .wave-hand { animation: wave 2.5s ease-in-out infinite; transform-origin: 70% 70%; display: inline-block; }
    
    .bounce-in { animation: bounce-in 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    .slide-up { animation: slide-up 0.6s ease-out forwards; }
    
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    
    .cute-button {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .cute-button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px -10px rgba(255, 154, 162, 0.5);
    }
    
    .cute-button:active {
      transform: translateY(0) scale(0.98);
    }
    
    .cute-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }
    
    .cute-button:hover::before {
      left: 100%;
    }
    
    .blob {
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    }
    
    .blob-2 {
      border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
    }
  </style>

  <script>
    const defaultConfig = {
      greeting: "Hello there!",
      name: "Jannice Salazar",
      tagline: "✨ Designer & Developer crafting digital magic ✨",
      button_text: "Enter my world",
      background_color: "#fff5f5",
      accent_color: "#FF9AA2",
      text_color: "#9B9B9B",
      button_color: "#FF9AA2",
      secondary_color: "#B5EAD7",
      font_family: "Quicksand",
      font_size: 16
    };

    async function onConfigChange(config) {
      const greetingEl = document.getElementById('greeting-text');
      const nameEl = document.getElementById('name-text');
      const taglineEl = document.getElementById('tagline-text');
      const buttonEl = document.getElementById('cta-button');
      const wrapper = document.getElementById('app-wrapper');

      // Update text content
      const greeting = config.greeting || defaultConfig.greeting;
      greetingEl.innerHTML = `${greeting} <span class="wave-hand">👋</span>`;
      
      nameEl.textContent = config.name || defaultConfig.name;
      taglineEl.textContent = config.tagline || defaultConfig.tagline;
      
      const buttonText = config.button_text || defaultConfig.button_text;
      buttonEl.innerHTML = `<span class="relative z-10 flex items-center gap-2">${buttonText}<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg></span>`;

      // Update colors
      const bgColor = config.background_color || defaultConfig.background_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const buttonColor = config.button_color || defaultConfig.button_color;
      const secondaryColor = config.secondary_color || defaultConfig.secondary_color;

      wrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, ${bgColor}f8 50%, ${bgColor}f0 100%)`;
      greetingEl.style.color = accentColor;
      taglineEl.style.color = textColor;
      buttonEl.style.background = `linear-gradient(135deg, ${buttonColor}, ${buttonColor}dd, ${secondaryColor})`;

      // Update fonts
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;
      const fontStack = `${fontFamily}, sans-serif`;

      greetingEl.style.fontFamily = fontStack;
      nameEl.style.fontFamily = fontStack;
      taglineEl.style.fontFamily = fontStack;
      buttonEl.style.fontFamily = fontStack;

      greetingEl.style.fontSize = `${fontSize * 1.25}px`;
      taglineEl.style.fontSize = `${fontSize * 1.125}px`;
      buttonEl.style.fontSize = `${fontSize * 1.125}px`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => config.button_color || defaultConfig.button_color,
            set: (value) => { config.button_color = value; window.elementSdk.setConfig({ button_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["greeting", config.greeting || defaultConfig.greeting],
        ["name", config.name || defaultConfig.name],
        ["tagline", config.tagline || defaultConfig.tagline],
        ["button_text", config.button_text || defaultConfig.button_text]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Add gradient animation keyframes
    const style = document.createElement('style');
    style.textContent = `
      @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    `;
    document.head.appendChild(style);

    // Button click interaction
    document.getElementById('cta-button').addEventListener('click', function() {
      this.innerHTML = `<span class="relative z-10 flex items-center gap-2">Coming soon! 🎉</span>`;
      setTimeout(() => {
        const buttonText = (window.elementSdk?.config?.button_text) || defaultConfig.button_text;
        this.innerHTML = `<span class="relative z-10 flex items-center gap-2">${buttonText}<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg></span>`;
      }, 2000);
    });
  </script>
